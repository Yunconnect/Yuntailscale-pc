name: Build Tailscale for Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.3' # 使用 Go 1.26.3

    - name: Build yuntailscale.exe
      run: |
        cd cmd/tailscale
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../../yuntailscale.exe .

    - name: Build yuntailscaled.exe
      run: |
        cd cmd/tailscaled
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../../yuntailscaled.exe .

    - name: Upload yuntailscale.exe
      uses: actions/upload-artifact@v4
      with:
        name: yuntailscale-client
        path: yuntailscale.exe

    - name: Upload yuntailscaled.exe
      uses: actions/upload-artifact@v4
      with:
        name: yuntailscale-daemon
        path: yuntailscaled.exe
