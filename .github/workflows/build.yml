name: Build Tailscale for Windows (Multi-Arch)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, 386, arm64]
        include:
          - arch: amd64
            upx_args: "--best --lzma --ultra-brute"
          - arch: 386
            upx_args: "--best --lzma"
          - arch: arm64
            upx_args: "--best --lzma"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21.13'
        cache: true

    - name: Install UPX
      run: |
        sudo apt-get update
        sudo apt-get install -y upx

    - name: Get version info
      id: version
      run: |
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Customize interface names
      run: |
        # 修改网卡名称
        find . -name "*.go" -type f ! -path "./vendor/*" -exec sed -i \
          -e 's/"Tailscale"/"Yuntailscale"/g' \
          -e 's/tailscale/yuntailscale/g' \
          -e 's/Tailscale/Yuntailscale/g' {} \;

    - name: Build yuntailscale.exe for ${{ matrix.arch }}
      run: |
        echo "Building for ${{ matrix.arch }}..."
        
        cd cmd/tailscale
        CGO_ENABLED=0 GOOS=windows GOARCH=${{ matrix.arch }} go build \
          -ldflags="-s -w -H=windowsgui -extldflags '-static' -X main.version=${{ steps.version.outputs.version }}" \
          -gcflags="all=-l -B -dwarflocationlists=0" \
          -asmflags="all=-dynlink=0" \
          -trimpath \
          -o ../../yuntailscale_${{ matrix.arch }}_tmp.exe .
        cd ../..
        
        upx ${{ matrix.upx_args }} --no-relocate yuntailscale_${{ matrix.arch }}_tmp.exe -o yuntailscale_${{ matrix.arch }}.exe
        rm yuntailscale_${{ matrix.arch }}_tmp.exe

    - name: Build yuntailscaled.exe for ${{ matrix.arch }}
      run: |
        echo "Building for ${{ matrix.arch }}..."
        
        cd cmd/tailscaled
        CGO_ENABLED=0 GOOS=windows GOARCH=${{ matrix.arch }} go build \
          -ldflags="-s -w -extldflags '-static' -X main.version=${{ steps.version.outputs.version }}" \
          -gcflags="all=-l -B -dwarflocationlists=0" \
          -asmflags="all=-dynlink=0" \
          -trimpath \
          -o ../../yuntailscaled_${{ matrix.arch }}_tmp.exe .
        cd ../..
        
        upx ${{ matrix.upx_args }} --no-relocate yuntailscaled_${{ matrix.arch }}_tmp.exe -o yuntailscaled_${{ matrix.arch }}.exe
        rm yuntailscaled_${{ matrix.arch }}_tmp.exe

    - name: Show build results
      run: |
        echo "=== Build Results for ${{ matrix.arch }} ==="
        ls -lh yuntailscale_${{ matrix.arch }}.exe yuntailscaled_${{ matrix.arch }}.exe

    - name: Upload artifacts for ${{ matrix.arch }}
      uses: actions/upload-artifact@v4
      with:
        name: yuntailscale-windows-${{ matrix.arch }}
        path: |
          yuntailscale_${{ matrix.arch }}.exe
          yuntailscaled_${{ matrix.arch }}.exe
        compression-level: 0
