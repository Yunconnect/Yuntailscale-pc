name: Build Tailscale for Windows (稳定版)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21.13'
        cache: true

    - name: Install UPX
      run: |
        sudo apt-get update
        sudo apt-get install -y upx

    - name: Build yuntailscale.exe
      run: |
        cd cmd/tailscale
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
          -ldflags="-s -w -H=windowsgui -extldflags '-static'" \
          -trimpath \
          -o ../../yuntailscale_tmp.exe .
        cd ../..
        upx --best --lzma yuntailscale_tmp.exe -o yuntailscale.exe
        rm yuntailscale_tmp.exe

    - name: Build yuntailscaled.exe
      run: |
        cd cmd/tailscaled
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
          -ldflags="-s -w -extldflags '-static'" \
          -trimpath \
          -o ../../yuntailscaled_tmp.exe .
        cd ../..
        upx --best --lzma yuntailscaled_tmp.exe -o yuntailscaled.exe
        rm yuntailscaled_tmp.exe

    - name: Show build results
      run: |
        echo "=========================================="
        echo "  编译成果"
        echo "=========================================="
        ls -lh yuntailscale.exe yuntailscaled.exe
        echo ""
        sha256sum yuntailscale.exe yuntailscaled.exe

    - name: Upload yuntailscale.exe
      uses: actions/upload-artifact@v4
      with:
        name: yuntailscale-client
        path: yuntailscale.exe
        compression-level: 0

    - name: Upload yuntailscaled.exe
      uses: actions/upload-artifact@v4
      with:
        name: yuntailscale-daemon
        path: yuntailscaled.exe
        compression-level: 0
