- name: Build yuntailscale.exe (极致瘦身 - 稳定版)
  run: |
    cd cmd/tailscale
    
    # 保守但高效的编译优化
    CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
      -ldflags="-s -w -H=windowsgui -extldflags '-static' -X main.version=${{ steps.version.outputs.version }}" \
      -gcflags="all=-l" \
      -trimpath \
      -o ../../yuntailscale_tmp.exe .
    
    cd ../..
    
    # UPX 压缩（使用稳定参数）
    upx --best --lzma yuntailscale_tmp.exe -o yuntailscale.exe
    rm yuntailscale_tmp.exe

